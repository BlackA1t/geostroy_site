limit_req_zone $binary_remote_addr zone=geostroy_per_ip:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location ~* \.(php|phtml|phar|asp|aspx|jsp|cgi)$ {
        return 404;
    }

    location ~* ^/\.(env|git)(/|$) {
        return 404;
    }

    location ~* ^/(wp-admin|wp-login|wordpress|wp-content|wp-includes|phpunit|vendor/phpunit|vendor|phpmyadmin|pma|cgi-bin|containers/json|server-status)(/|$) {
        return 404;
    }

    location /api/ {
        limit_req zone=geostroy_per_ip burst=30 nodelay;

        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=geostroy_per_ip burst=30 nodelay;

        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
