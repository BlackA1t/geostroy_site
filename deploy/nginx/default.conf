limit_req_zone $binary_remote_addr zone=geostroy_per_ip:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location = /.env {
        return 404;
    }

    location ^~ /.env {
        return 404;
    }

    location = /.git {
        return 404;
    }

    location ^~ /.git {
        return 404;
    }

    location ^~ /wp-admin {
        return 404;
    }

    location ^~ /wp-login {
        return 404;
    }

    location ^~ /wordpress {
        return 404;
    }

    location ^~ /wp-content {
        return 404;
    }

    location ^~ /wp-includes {
        return 404;
    }

    location ^~ /phpunit {
        return 404;
    }

    location ^~ /vendor {
        return 404;
    }

    location ^~ /phpmyadmin {
        return 404;
    }

    location ^~ /pma {
        return 404;
    }

    location ^~ /cgi-bin {
        return 404;
    }

    location ^~ /containers/json {
        return 404;
    }

    location ^~ /server-status {
        return 404;
    }

    location ~* \.(php|phtml|phar|asp|aspx|jsp|cgi)$ {
        return 404;
    }

    location /api/ {
        limit_req zone=geostroy_per_ip burst=30 nodelay;

        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=geostroy_per_ip burst=30 nodelay;

        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
